<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gemini Chatbot</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        #chat-box { width: 400px; height: 500px; border: 1px solid #ddd; overflow-y: auto; padding: 15px; background: #f9f9f9; border-radius: 8px; }
        .input-area { margin-top: 10px; display: flex; gap: 5px; }
        input { padding: 10px; width: 300px; }
        button { padding: 10px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="chat-box"></div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Ask Gemini something...">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const message = input.value.trim();

            if (!message) return;

            // 1. Show user message
            chatBox.innerHTML += `<p><strong>You:</strong> ${message}</p>`;
            input.value = '';

            // 2. Call our Django API
            try {

              const response = await fetch('http://127.0.0.1:8000/api/chat/', { // Full URL
              method: 'POST',
              headers: { 
                   'Content-Type': 'application/json',
              },
              body: JSON.stringify({ message: message })
              });
               

                const data = await response.json();

                // 3. Show Gemini's response
                if (data.response) {
                    chatBox.innerHTML += `<p><strong>Bot:</strong> ${data.response}</p>`;
                } else {
                    chatBox.innerHTML += `<p style="color:red"><strong>Error:</strong> ${data.error}</p>`;
                }
            } catch (err) {
                chatBox.innerHTML += `<p style="color:red">System Error: Could not connect.</p>`;
            }

            // Scroll to bottom
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
